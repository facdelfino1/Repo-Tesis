<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body>
    <main class="auth-page min-vh-100 d-flex align-items-center justify-content-center bg-light position-relative overflow-hidden py-5">
        <div class="auth-background position-absolute top-0 start-0 w-100 h-100 opacity-25" aria-hidden="true">
            <div class="auth-shape auth-shape-info position-absolute rounded-circle bg-info"></div>
            <div class="auth-shape auth-shape-primary position-absolute rounded-circle bg-primary"></div>
        </div>

        <section class="container position-relative">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                    <div class="card auth-card border-0 shadow-sm">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-4">
                                <span class="badge rounded-pill text-bg-primary mb-3">
                                    <i class="bi bi-shield-lock me-1"></i>Seguridad de acceso
                                </span>
                                <h1 class="h3 fw-bold text-primary mb-2">Recuperar contraseña</h1>
                                <p class="text-secondary mb-0">
                                    Ingrese su correo electrónico y le enviaremos instrucciones para restablecer el acceso.
                                </p>
                            </div>

                            <div id="recuperarPasswordSuccess" class="alert alert-success d-none" role="alert">
                                Si el correo ingresado se encuentra registrado, recibirá las instrucciones para restablecer su contraseña.
                            </div>

                            <!-- Formulario demostrativo: no envia emails ni consulta usuarios registrados. -->
                            <form id="recuperarPasswordForm" action="#" method="post" data-form="password-recovery" novalidate>
                                <div class="mb-3">
                                    <label for="recoveryEmail" class="form-label">Correo electrónico</label>
                                    <input
                                        type="email"
                                        class="form-control"
                                        id="recoveryEmail"
                                        name="email"
                                        placeholder="usuario@correo.com"
                                        autocomplete="email"
                                        required
                                    >
                                    <div class="invalid-feedback">Ingrese un correo electrónico válido.</div>
                                </div>

                                <div class="d-grid gap-2 mt-4">
                                    <button type="submit" class="btn btn-primary py-2">Enviar instrucciones</button>
                                    <a href="login.html" class="btn btn-outline-secondary py-2">Volver al Login</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/auth.js"></script>
</body>
</html>
