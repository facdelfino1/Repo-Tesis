<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso 
</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body>
    <main class="min-vh-100 d-flex align-items-center justify-content-center bg-light position-relative overflow-hidden py-5">
        <div class="position-absolute top-0 start-0 w-100 h-100 opacity-25" aria-hidden="true">
            <div class="position-absolute rounded-circle bg-info" style="width: 280px; height: 280px; top: -90px; left: -90px;"></div>
            <div class="position-absolute rounded-circle bg-primary" style="width: 220px; height: 220px; right: -70px; bottom: -70px;"></div>
        </div>

        <section class="container position-relative">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-4">
                                <span class="badge rounded-pill text-bg-primary mb-3">Sistema de salud</span>
                                <h1 class="h3 fw-bold text-primary mb-2">Sistema de Triaje Automatizado y Optimización Adaptativa de Consultas Médicas</h1>
                                <p class="text-secondary mb-0">
                                    Gestión de turnos, consultas y triaje médico automatizado.
                                </p>
                            </div>

                            <!-- Formulario visual: la autenticacion real se implementara en una etapa posterior. -->
                            <form action="#" method="post" novalidate>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Correo electrónico</label>
                                    <input
                                        type="email"
                                        class="form-control"
                                        id="email"
                                        name="email"
                                        placeholder="usuario@correo.com"
                                        autocomplete="email"
                                    >
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label">Contraseña</label>
                                    <input
                                        type="password"
                                        class="form-control"
                                        id="password"
                                        name="password"
                                        placeholder="Ingrese su contraseña"
                                        autocomplete="current-password"
                                    >
                                </div>

                                <button type="button" class="btn btn-primary w-100 py-2 mb-3">Ingresar</button>
                                <div class="d-flex flex-column flex-sm-row justify-content-between gap-2 small">
                                    <a href="recuperar-password.html" class="link-primary text-decoration-none">¿Olvidaste tu contraseña?</a>
                                    <a href="registro.html" class="link-primary text-decoration-none">Registrarse</a>
                                </div>
                            </form>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/auth.js"></script>
</body>
</html>
