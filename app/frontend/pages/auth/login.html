<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body>
    <main class="auth-page auth-page-login min-vh-100 d-flex align-items-center justify-content-center position-relative overflow-hidden py-5">
        <section class="container position-relative">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                    <div class="card auth-card login-card border-0">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-4">
                                <h1 class="h3 fw-bold text-primary mb-2">Consultorios Privados Jovita</h1>
                            </div>

                            <form action="#" method="post" novalidate>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Correo electrónico</label>
                                    <input
                                        type="email"
                                        class="form-control"
                                        id="email"
                                        name="email"
                                        placeholder="usuario@correo.com"
                                        autocomplete="email"
                                    >
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label">Contraseña</label>
                                    <div class="input-group">
                                        <input
                                            type="password"
                                            class="form-control"
                                            id="password"
                                            name="password"
                                            placeholder="Ingrese su contraseña"
                                            autocomplete="current-password"
                                        >
                                        <button type="button" class="btn btn-outline-secondary" data-action="toggle-password" data-target="password" aria-label="Mostrar contraseña" title="Mostrar contraseña">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </div>
                                </div>

                                <button type="button" class="btn btn-primary w-100 py-2 mb-3">Ingresar</button>
                                <div class="d-flex flex-column flex-sm-row justify-content-between gap-2 small">
                                    <a href="recuperar-password.html" class="link-primary text-decoration-none">Olvide mi contraseña</a>
                                    <a href="registro.html" class="link-primary text-decoration-none">Registrarse</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/auth.js"></script>
</body>
</html>
